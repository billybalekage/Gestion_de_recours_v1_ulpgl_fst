<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer Admin - Portail Administrateur</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .logo span {
      font-size: 40px;
      color: #1e3c72;
    }

    .logo h1 {
      font-size: 28px;
      color: #1e3c72;
      font-weight: 700;
    }

    .register-header p {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }

    .security-note {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #856404;
      display: flex;
      gap: 8px;
    }

    .security-note span {
      flex-shrink: 0;
      font-size: 18px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #1e3c72;
      box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
    }

    .password-strength {
      font-size: 12px;
      margin-top: 6px;
      padding: 6px;
      border-radius: 4px;
      display: none;
    }

    .password-strength.weak {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }

    .password-strength.fair {
      display: block;
      background: #fff3cd;
      color: #856404;
    }

    .password-strength.strong {
      display: block;
      background: #d4edda;
      color: #155724;
    }

    .form-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .form-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
    }

    .form-button:active {
      transform: translateY(0);
    }

    .error-message {
      color: #dc3545;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #28a745;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .footer-text {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-top: 24px;
    }

    .footer-text a {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 20px 0;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      cursor: pointer;
      font-size: 13px;
      color: #333;
    }

    .init-code-group {
      display: none;
    }

    .init-code-group.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <div class="logo">
        <span class="material-symbols-outlined">shield_admin</span>
        <h1>Admin</h1>
      </div>
      <p>Créer un compte administrateur</p>
    </div>

    <div class="security-note">
      <span class="material-symbols-outlined">info</span>
      <div>
        <strong>Premier Admin :</strong> Créez le premier compte admin sans clé.
        <strong>Autres Admins :</strong> Nécessite une clé d'initialisation.
      </div>
    </div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="name">Nom</label>
          <input id="name" class="form-input" type="text" required placeholder="Nom" />
          <div class="error-message" id="name-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input id="email" class="form-input" type="email" required placeholder="admin@example.com" />
          <div class="error-message" id="email-error"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <input id="password" class="form-input" type="password" required placeholder="••••••••" />
          <div class="password-strength" id="password-strength"></div>
          <div class="error-message" id="password-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">Confirmer</label>
          <input id="password-confirm" class="form-input" type="password" required placeholder="••••••••" />
          <div class="error-message" id="password-confirm-error"></div>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="use-init-code" />
        <label for="use-init-code">J'ai une clé d'initialisation</label>
      </div>

      <div class="init-code-group" id="init-code-group">
        <div class="form-group full">
          <label class="form-label" for="init-code">Clé d'initialisation</label>
          <input id="init-code" class="form-input" type="password" placeholder="Entrez la clé fournie" />
          <div class="error-message" id="init-code-error"></div>
        </div>
      </div>

      <button type="submit" class="form-button">Créer le compte</button>
      <div class="error-message" id="form-error"></div>
      <div class="success-message" id="form-success"></div>
    </form>

    <div class="divider"></div>

    <div class="footer-text">
      Vous avez un compte ? <a href="login.html">Se connecter</a>
      <br /><br />
      <a href="../login.html">← Retour au portail utilisateur</a>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
