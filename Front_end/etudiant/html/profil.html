<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil étudiant | Gestion des Recours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400..700,0..1,0" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <link href="../css/student-common.css" rel="stylesheet" />
  </head>
  <body>
    <div class="app-container">
      <button id="menu-toggle" class="mobile-menu-btn" type="button" aria-label="Ouvrir le menu">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="brand-container">
            <div class="brand-icon">
              <span class="material-symbols-outlined">school</span>
            </div>
            <div>
              <h1 class="brand-title">Gestion des Recours</h1>
              <p class="brand-subtitle">Portail étudiant</p>
            </div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item" href="dashboard.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span>Dashboard</span>
          </a>
          <a class="nav-item" href="recours.html">
            <span class="material-symbols-outlined">gavel</span>
            <span>Recours</span>
          </a>
          <a class="nav-item" href="notes.html">
            <span class="material-symbols-outlined">description</span>
            <span>Notes</span>
          </a>
          <a class="nav-item" href="notification.html">
            <span class="material-symbols-outlined">notifications</span>
            <span>Notifications</span>
          </a>
          <a class="nav-item" href="profil.html">
            <span class="material-symbols-outlined">account_circle</span>
            <span>Profil</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <button class="logout-btn">
            <span class="material-symbols-outlined">logout</span>
            <span>Déconnexion</span>
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-navbar">
          <div class="header-left">
            <h2 class="header-title">Profil Étudiant</h2>
          </div>
          <div class="user-area">
            <div class="user-info">
              <span class="user-name" id="studentName">Chargement...</span>
              <span class="user-id" id="studentMatricule">Matricule: --</span>
            </div>
            <button class="profile-btn" aria-label="Profil utilisateur">
              <span class="material-symbols-outlined">account_circle</span>
            </button>
          </div>
        </header>

        <div class="page-canvas">
          <div class="page-header">
            <div>
              <h1 class="page-title">Mon Profil</h1>
              <p class="page-subtitle" id="studentInfo">Chargement des informations...</p>
            </div>
          </div>

          <section class="profile-card">
            <div class="profile-grid">
              <div class="profile-field">
                <span class="field-label">Nom</span>
                <span class="field-value" id="studentNameValue">Chargement...</span>
              </div>
              <div class="profile-field">
                <span class="field-label">Matricule</span>
                <span class="field-value" id="studentMatriculeValue">--</span>
              </div>
              <div class="profile-field">
                <span class="field-label">Statut</span>
                <span class="field-value" id="studentStatus">Étudiant</span>
              </div>
            </div>

            <div class="alert-banner hidden" id="profileError"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="../js/profile.js"></script>
    <script src="../js/sidebar.js"></script>
  </body>
</html>
